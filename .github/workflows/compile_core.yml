name: Compile Nexus Core

on:
  push:
    branches: [ main, master ] # سيعمل تلقائياً عند رفع الكود لـ جيتهاب

jobs:
  build_wasm:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Emscripten Toolchain
      uses: mymindstorm/setup-emsdk@v12
      with:
        version: 'latest'

    - name: Bake Royal Nucleus Core
      run: |
        # الأمر مجهز بمسار ملفك الدقيق للطبخ الفوري
        emcc -O3 -std=c++17 nexus_core/royal_nucleus.cpp -o nexus_core/royal_nucleus.js --bind

    - name: Archive Finished Production Files
      uses: actions/upload-artifact@v3
      with:
        name: nexus-core-outputs
        path: |
          nexus_core/royal_nucleus.js
          nexus_core/royal_nucleus.wasm
